name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Upload Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-X main.version=${VERSION}"

          # Linux AMD64
          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/antiscan-simple-linux-amd64 cmd/main.go

          # Linux ARM64
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/antiscan-simple-linux-arm64 cmd/main.go

          # Linux ARM
          GOOS=linux GOARCH=arm go build -ldflags="${LDFLAGS}" -o dist/antiscan-simple-linux-arm cmd/main.go

          # Linux 386
          GOOS=linux GOARCH=386 go build -ldflags="${LDFLAGS}" -o dist/antiscan-simple-linux-386 cmd/main.go

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/antiscan-simple-*
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
